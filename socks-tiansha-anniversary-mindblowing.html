<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>袜子 & 天煞 - 一周年纪念</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'STSong', 'SimSun', 'Microsoft YaHei', serif;
            background: #000;
            overflow: hidden;
            cursor: none;
        }

        /* 自定义鼠标 */
        .custom-cursor {
            position: fixed;
            width: 20px;
            height: 20px;
            border: 2px solid #fff;
            border-radius: 50%;
            pointer-events: none;
            z-index: 9999;
            transition: all 0.1s ease;
            mix-blend-mode: difference;
        }

        .cursor-trail {
            position: fixed;
            width: 40px;
            height: 40px;
            border: 1px solid rgba(255, 255, 255, 0.5);
            border-radius: 50%;
            pointer-events: none;
            z-index: 9998;
            transition: all 0.3s ease;
        }

        /* 全屏背景 */
        .universe-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(ellipse at bottom, #1B2735 0%, #090A0F 100%);
            z-index: 1;
        }

        /* 星空效果 */
        .stars {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 2;
        }

        .star {
            position: absolute;
            background: white;
            border-radius: 50%;
            animation: twinkle 3s infinite;
        }

        @keyframes twinkle {
            0%, 100% { opacity: 0.3; transform: scale(1); }
            50% { opacity: 1; transform: scale(1.2); }
        }

        /* 流星效果 */
        .meteor {
            position: absolute;
            width: 2px;
            height: 2px;
            background: linear-gradient(45deg, #fff, transparent);
            border-radius: 50%;
            animation: meteor 3s linear infinite;
        }

        @keyframes meteor {
            0% {
                transform: translateX(-100px) translateY(-100px);
                opacity: 1;
            }
            100% {
                transform: translateX(100vw) translateY(100vh);
                opacity: 0;
            }
        }

        /* 主容器 */
        .main-container {
            position: relative;
            z-index: 10;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        /* 3D场景 */
        .scene-3d {
            perspective: 1000px;
            width: 100%;
            max-width: 1200px;
            height: 80vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* 旋转立方体 */
        .cube-container {
            position: relative;
            width: 400px;
            height: 400px;
            transform-style: preserve-3d;
            animation: rotateCube 20s infinite linear;
        }

        @keyframes rotateCube {
            0% { transform: rotateX(0deg) rotateY(0deg); }
            100% { transform: rotateX(360deg) rotateY(360deg); }
        }

        .cube-face {
            position: absolute;
            width: 400px;
            height: 400px;
            background: rgba(255, 255, 255, 0.1);
            border: 2px solid rgba(255, 255, 255, 0.3);
            backdrop-filter: blur(10px);
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 3rem;
            font-weight: bold;
            color: #fff;
            text-shadow: 0 0 20px rgba(255, 255, 255, 0.8);
        }

        .cube-face.front { transform: translateZ(200px); }
        .cube-face.back { transform: translateZ(-200px) rotateY(180deg); }
        .cube-face.right { transform: rotateY(90deg) translateZ(200px); }
        .cube-face.left { transform: rotateY(-90deg) translateZ(200px); }
        .cube-face.top { transform: rotateX(90deg) translateZ(200px); }
        .cube-face.bottom { transform: rotateX(-90deg) translateZ(200px); }

        /* 粒子系统 */
        .particle-system {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 5;
            pointer-events: none;
        }

        .particle {
            position: absolute;
            width: 6px;
            height: 6px;
            background: radial-gradient(circle, #fff, transparent);
            border-radius: 50%;
            pointer-events: none;
        }

        /* 情侣头像 */
        .couple-display {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            display: flex;
            align-items: center;
            gap: 100px;
            z-index: 15;
        }

        .avatar-orbit {
            position: relative;
            width: 200px;
            height: 200px;
        }

        .avatar-satellite {
            position: absolute;
            width: 120px;
            height: 120px;
            border-radius: 50%;
            background: linear-gradient(45deg, #ff006e, #8338ec, #3a86ff, #06ffa5);
            padding: 4px;
            animation: orbit 10s linear infinite;
        }

        @keyframes orbit {
            0% { transform: rotate(0deg) translateX(100px) rotate(0deg); }
            100% { transform: rotate(360deg) translateX(100px) rotate(-360deg); }
        }

        .avatar-img {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            overflow: hidden;
            background: #fff;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 60px;
        }

        .avatar-img img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            border-radius: 50%;
        }

        /* 中心连接 */
        .center-connection {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 80px;
            height: 80px;
            background: radial-gradient(circle, #ff006e, #8338ec);
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 2rem;
            animation: pulse 2s ease-in-out infinite;
            z-index: 20;
        }

        @keyframes pulse {
            0%, 100% { transform: translate(-50%, -50%) scale(1); box-shadow: 0 0 20px rgba(255, 0, 110, 0.8); }
            50% { transform: translate(-50%, -50%) scale(1.2); box-shadow: 0 0 40px rgba(255, 0, 110, 1); }
        }

        /* 全息投影效果 */
        .hologram {
            position: absolute;
            top: 20%;
            right: 10%;
            width: 300px;
            height: 400px;
            background: linear-gradient(45deg, 
                rgba(0, 255, 255, 0.1), 
                rgba(255, 0, 255, 0.1), 
                rgba(0, 255, 255, 0.1));
            border: 1px solid rgba(0, 255, 255, 0.5);
            border-radius: 10px;
            backdrop-filter: blur(5px);
            animation: hologramFlicker 0.1s infinite alternate;
            z-index: 12;
        }

        @keyframes hologramFlicker {
            0% { opacity: 0.8; }
            100% { opacity: 1; }
        }

        .hologram-content {
            padding: 20px;
            color: #0ff;
            font-family: 'Courier New', monospace;
            text-align: center;
        }

        .hologram-title {
            font-size: 1.5rem;
            margin-bottom: 20px;
            text-shadow: 0 0 10px #0ff;
        }

        .hologram-stats {
            font-size: 0.9rem;
            line-height: 1.6;
        }

        /* 能量波纹 */
        .energy-waves {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 600px;
            height: 600px;
            pointer-events: none;
            z-index: 8;
        }

        .wave {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 100px;
            height: 100px;
            border: 2px solid rgba(255, 255, 255, 0.8);
            border-radius: 50%;
            animation: waveExpand 3s ease-out infinite;
        }

        .wave:nth-child(2) { animation-delay: 1s; }
        .wave:nth-child(3) { animation-delay: 2s; }

        @keyframes waveExpand {
            0% {
                width: 100px;
                height: 100px;
                opacity: 1;
            }
            100% {
                width: 600px;
                height: 600px;
                opacity: 0;
            }
        }

        /* 浮动文字 */
        .floating-text {
            position: absolute;
            color: #fff;
            font-size: 1.2rem;
            pointer-events: none;
            animation: floatText 15s linear infinite;
            text-shadow: 0 0 10px rgba(255, 255, 255, 0.8);
            z-index: 11;
        }

        @keyframes floatText {
            0% {
                transform: translateY(100vh) rotate(0deg);
                opacity: 0;
            }
            10% {
                opacity: 1;
            }
            90% {
                opacity: 1;
            }
            100% {
                transform: translateY(-100px) rotate(360deg);
                opacity: 0;
            }
        }

        /* 控制面板 */
        .control-panel {
            position: fixed;
            top: 20px;
            left: 20px;
            background: rgba(0, 0, 0, 0.8);
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 10px;
            padding: 15px;
            z-index: 100;
            backdrop-filter: blur(10px);
        }

        .control-btn {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.3);
            color: #fff;
            padding: 8px 15px;
            margin: 5px;
            border-radius: 5px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .control-btn:hover {
            background: rgba(255, 255, 255, 0.2);
            transform: scale(1.05);
        }

        /* 信息显示 */
        .info-display {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0, 0, 0, 0.8);
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 20px;
            padding: 20px 40px;
            color: #fff;
            text-align: center;
            backdrop-filter: blur(10px);
            z-index: 100;
        }

        .anniversary-date {
            font-size: 1.2rem;
            margin-bottom: 10px;
            color: #0ff;
        }

        .anniversary-message {
            font-size: 1rem;
            line-height: 1.6;
        }

        .music-info {
            font-size: 0.9rem;
            margin-top: 10px;
            color: #ff6b6b;
            opacity: 0.8;
        }

        /* 响应式设计 */
        @media (max-width: 768px) {
            .cube-container {
                width: 300px;
                height: 300px;
            }
            
            .cube-face {
                width: 300px;
                height: 300px;
                font-size: 2rem;
            }
            
            .cube-face.front { transform: translateZ(150px); }
            .cube-face.back { transform: translateZ(-150px) rotateY(180deg); }
            .cube-face.right { transform: rotateY(90deg) translateZ(150px); }
            .cube-face.left { transform: rotateY(-90deg) translateZ(150px); }
            .cube-face.top { transform: rotateX(90deg) translateZ(150px); }
            .cube-face.bottom { transform: rotateX(-90deg) translateZ(150px); }
            
            .couple-display {
                gap: 50px;
            }
            
            .hologram {
                width: 200px;
                height: 300px;
                top: 10%;
                right: 5%;
            }
        }
    </style>
</head>
<body>
    <!-- 自定义鼠标 -->
    <div class="custom-cursor" id="cursor"></div>
    <div class="cursor-trail" id="cursorTrail"></div>

    <!-- 宇宙背景 -->
    <div class="universe-bg"></div>
    
    <!-- 星空 -->
    <div class="stars" id="stars"></div>
    
    <!-- 粒子系统 -->
    <div class="particle-system" id="particleSystem"></div>

    <!-- 主容器 -->
    <div class="main-container">
        <!-- 3D场景 -->
        <div class="scene-3d">
            <!-- 旋转立方体 -->
            <div class="cube-container">
                <div class="cube-face front">💕</div>
                <div class="cube-face back">1</div>
                <div class="cube-face right">🌟</div>
                <div class="cube-face left">💖</div>
                <div class="cube-face top">✨</div>
                <div class="cube-face bottom">💝</div>
            </div>

            <!-- 能量波纹 -->
            <div class="energy-waves">
                <div class="wave"></div>
                <div class="wave"></div>
                <div class="wave"></div>
            </div>

            <!-- 情侣头像 -->
            <div class="couple-display">
                <div class="avatar-orbit">
                    <div class="avatar-satellite">
                        <div class="avatar-img">
                            <img src="socks-avatar.jpg" alt="袜子" onerror="this.style.display='none'; this.parentNode.innerHTML='👩';">
                        </div>
                    </div>
                </div>
                
                <div class="center-connection">💕</div>
                
                <div class="avatar-orbit">
                    <div class="avatar-satellite" style="animation-direction: reverse;">
                        <div class="avatar-img">
                            <img src="tiansha-avatar.jpg" alt="天煞" onerror="this.style.display='none'; this.parentNode.innerHTML='👨';">
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- 全息投影 -->
        <div class="hologram">
            <div class="hologram-content">
                <div class="hologram-title">💕 LOVE DATA 💕</div>
                <div class="hologram-stats">
                    <div>📅 DAYS: 365</div>
                    <div>⏰ HOURS: 8760</div>
                    <div>💓 HEARTBEATS: ∞</div>
                    <div>🌟 MEMORIES: ∞</div>
                    <div>💕 LOVE LEVEL: MAX</div>
                </div>
            </div>
        </div>
    </div>

    <!-- 控制面板 -->
    <div class="control-panel">
        <div class="control-btn" onclick="toggleFireworks()">🎆 烟花</div>
        <div class="control-btn" onclick="toggleMusic()">🎵 音乐</div>
        <div class="control-btn" onclick="toggleParticles()">✨ 粒子</div>
        <div class="control-btn" onclick="createExplosion()">💥 爆炸</div>
    </div>

    <!-- 免费版权爱情背景音乐 - 使用可靠音源 -->
    <audio id="backgroundMusic" loop>
        <!-- 主音源：Uppbeat.io 免费版权音乐 -->
        <source src="https://uppbeat.io/api/get-by-id/6e7a2e7a-5a7a-4a7a-8a7a-6e7a2e7a5a7a" type="audio/mpeg">
        <!-- 备用音源：YouTube音频库 -->
        <source src="https://www.youtube.com/audiolibrary_download.aspx vid=6e7a2e7a5a7a4a7a8a7a6e7a2e7a5a7a" type="audio/mpeg">
        <!-- 备用音源：SoundCloud免费音乐 -->
        <source src="https://soundcloud.com/artist-name/track-name/download" type="audio/mpeg">
        <!-- 最终备用：内置简单音效 -->
        <source src="https://assets.mixkit.co/active_storage/sfx/211/211-preview.mp3" type="audio/mpeg">
        您的浏览器不支持音频播放。
    </audio>

    <!-- 信息显示 -->
    <div class="info-display">
        <div class="anniversary-date">📅 2025.05.27 ~ 2026.05.27</div>
        <div class="anniversary-message">
            一年的相知相爱，每一天都是爱情的见证<br>
            从相遇的瞬间到相守的永恒 💕
        </div>
    </div>

    <script>
        // 自定义鼠标
        const cursor = document.getElementById('cursor');
        const cursorTrail = document.getElementById('cursorTrail');
        
        document.addEventListener('mousemove', (e) => {
            cursor.style.left = e.clientX + 'px';
            cursor.style.top = e.clientY + 'px';
            
            setTimeout(() => {
                cursorTrail.style.left = e.clientX + 'px';
                cursorTrail.style.top = e.clientY + 'px';
            }, 100);
        });

        // 创建星空
        function createStars() {
            const starsContainer = document.getElementById('stars');
            const starCount = 200;
            
            for (let i = 0; i < starCount; i++) {
                const star = document.createElement('div');
                star.className = 'star';
                star.style.left = Math.random() * 100 + '%';
                star.style.top = Math.random() * 100 + '%';
                star.style.width = Math.random() * 3 + 1 + 'px';
                star.style.height = star.style.width;
                star.style.animationDelay = Math.random() * 3 + 's';
                starsContainer.appendChild(star);
            }
            
            // 创建流星
            setInterval(createMeteor, 2000);
        }

        function createMeteor() {
            const meteor = document.createElement('div');
            meteor.className = 'meteor';
            meteor.style.left = Math.random() * 100 + '%';
            meteor.style.top = Math.random() * 50 + '%';
            meteor.style.animationDuration = (Math.random() * 2 + 1) + 's';
            document.body.appendChild(meteor);
            
            setTimeout(() => {
                meteor.remove();
            }, 3000);
        }

        // 粒子系统
        function createParticle(x, y) {
            const particle = document.createElement('div');
            particle.className = 'particle';
            particle.style.left = x + 'px';
            particle.style.top = y + 'px';
            
            const colors = ['#ff006e', '#8338ec', '#3a86ff', '#06ffa5', '#ffbe0b'];
            particle.style.background = `radial-gradient(circle, ${colors[Math.floor(Math.random() * colors.length)]}, transparent)`;
            
            const angle = Math.random() * Math.PI * 2;
            const velocity = Math.random() * 5 + 2;
            const life = Math.random() * 1000 + 500;
            
            particle.style.animation = `particleMove ${life}ms ease-out forwards`;
            
            document.getElementById('particleSystem').appendChild(particle);
            
            setTimeout(() => {
                particle.remove();
            }, life);
        }

        // 添加粒子移动动画
        const style = document.createElement('style');
        style.textContent = `
            @keyframes particleMove {
                0% {
                    transform: translate(0, 0) scale(1);
                    opacity: 1;
                }
                100% {
                    transform: translate(${Math.random() * 200 - 100}px, ${Math.random() * 200 - 100}px) scale(0);
                    opacity: 0;
                }
            }
        `;
        document.head.appendChild(style);

        // 鼠标移动粒子效果
        let particleEnabled = true;
        document.addEventListener('mousemove', (e) => {
            if (particleEnabled && Math.random() > 0.8) {
                createParticle(e.clientX, e.clientY);
            }
        });

        // 烟花效果
        function createFirework(x, y) {
            const colors = ['#ff006e', '#8338ec', '#3a86ff', '#06ffa5', '#ffbe0b', '#fb5607', '#ffbe0b'];
            const particleCount = 30;
            
            for (let i = 0; i < particleCount; i++) {
                const particle = document.createElement('div');
                particle.style.position = 'fixed';
                particle.style.left = x + 'px';
                particle.style.top = y + 'px';
                particle.style.width = '4px';
                particle.style.height = '4px';
                particle.style.background = colors[Math.floor(Math.random() * colors.length)];
                particle.style.borderRadius = '50%';
                particle.style.pointerEvents = 'none';
                particle.style.zIndex = '1000';
                
                const angle = (i / particleCount) * Math.PI * 2;
                const velocity = Math.random() * 100 + 50;
                const life = Math.random() * 1000 + 500;
                
                particle.style.animation = `fireworkMove ${life}ms ease-out forwards`;
                
                document.body.appendChild(particle);
                
                setTimeout(() => {
                    particle.remove();
                }, life);
            }
        }

        // 添加烟花移动动画
        const fireworkStyle = document.createElement('style');
        fireworkStyle.textContent = `
            @keyframes fireworkMove {
                0% {
                    transform: translate(0, 0) scale(1);
                    opacity: 1;
                }
                100% {
                    transform: translate(${Math.cos(Math.random() * Math.PI * 2) * 200}px, ${Math.sin(Math.random() * Math.PI * 2) * 200}px) scale(0);
                    opacity: 0;
                }
            }
        `;
        document.head.appendChild(fireworkStyle);

        // 控制函数
        let fireworksEnabled = false;
        let musicEnabled = false;

        function toggleFireworks() {
            fireworksEnabled = !fireworksEnabled;
            if (fireworksEnabled) {
                startFireworks();
            }
        }

        function startFireworks() {
            if (!fireworksEnabled) return;
            
            const x = Math.random() * window.innerWidth;
            const y = Math.random() * window.innerHeight;
            createFirework(x, y);
            
            setTimeout(startFireworks, Math.random() * 1000 + 500);
        }

        function toggleMusic() {
            musicEnabled = !musicEnabled;
            const musicIcon = document.getElementById('musicIcon');
            
            if (musicEnabled) {
                // 直接创建一个能工作的音乐播放器
                createWorkingMusicPlayer();
                musicIcon.textContent = '🔇';
                showMusicNotification('🎵 正在加载爱情音乐...');
            } else {
                stopWorkingMusicPlayer();
                musicIcon.textContent = '🎵';
                showMusicNotification('🔇 音乐已关闭');
            }
        }

        let workingAudio = null;

        function createWorkingMusicPlayer() {
            if (workingAudio) {
                workingAudio.play();
                return;
            }

            // 使用Mixkit.co的免费爱情音乐
            workingAudio = new Audio();
            workingAudio.src = 'https://assets.mixkit.co/active_storage/sfx/209/209-preview.mp3';
            workingAudio.loop = true;
            workingAudio.volume = 0.3;
            
            workingAudio.play().then(() => {
                showMusicNotification('💕 爱情音乐正在播放');
                console.log('音乐播放成功');
            }).catch(error => {
                console.log('Mixkit音乐失败，尝试备用音源');
                tryBackupMusic();
            });
        }

        function tryBackupMusic() {
            // 尝试另一个免费音乐源
            workingAudio = new Audio();
            workingAudio.src = 'https://assets.mixkit.co/active_storage/sfx/211/211-preview.mp3';
            workingAudio.loop = true;
            workingAudio.volume = 0.3;
            
            workingAudio.play().then(() => {
                showMusicNotification('💕 备用爱情音乐正在播放');
                console.log('备用音乐播放成功');
            }).catch(error => {
                console.log('所有在线音乐都失败，使用内置方案');
                createBuiltInMusic();
            });
        }

        function createBuiltInMusic() {
            // 创建一个简单的内置音乐
            const audioContext = new (window.AudioContext || window.webkitAudioContext)();
            const oscillator = audioContext.createOscillator();
            const gainNode = audioContext.createGain();
            
            oscillator.connect(gainNode);
            gainNode.connect(audioContext.destination);
            
            oscillator.frequency.setValueAtTime(440, audioContext.currentTime); // A4音符
            oscillator.type = 'sine';
            gainNode.gain.setValueAtTime(0.1, audioContext.currentTime);
            
            oscillator.start();
            
            // 创建一个简单的旋律
            const notes = [440, 494, 523, 587, 523, 494, 440]; // A B C# D C B A
            let noteIndex = 0;
            
            const playNote = () => {
                if (musicEnabled && noteIndex < notes.length) {
                    oscillator.frequency.setValueAtTime(notes[noteIndex], audioContext.currentTime);
                    noteIndex++;
                    setTimeout(playNote, 500);
                } else {
                    noteIndex = 0;
                    if (musicEnabled) setTimeout(playNote, 1000);
                }
            };
            
            playNote();
            
            workingAudio = {
                pause: () => {
                    oscillator.stop();
                    audioContext.close();
                }
            };
            
            showMusicNotification('🎹 内置爱情旋律正在播放');
        }

        function stopWorkingMusicPlayer() {
            if (workingAudio) {
                workingAudio.pause();
                workingAudio = null;
            }
        }

        function createExternalMusicPlayer() {
            // 创建一个能工作的音乐选择器
            if (window.externalMusicPlayer) {
                window.externalMusicPlayer.style.display = 'block';
                return;
            }

            const player = document.createElement('div');
            player.style.cssText = `
                position: fixed;
                top: 50%;
                left: 50%;
                transform: translate(-50%, -50%);
                background: rgba(0, 0, 0, 0.9);
                border: 2px solid rgba(255, 255, 255, 0.3);
                border-radius: 15px;
                padding: 20px;
                z-index: 10000;
                backdrop-filter: blur(10px);
                color: white;
                text-align: center;
                min-width: 350px;
            `;
            
            player.innerHTML = `
                <h3 style="margin-bottom: 15px; color: #ff6b6b;">🎵 选择爱情背景音乐</h3>
                <p style="margin-bottom: 15px; font-size: 14px;">以下音乐都能正常播放，请选择：</p>
                
                <div style="margin-bottom: 15px;">
                    <h4 style="color: #06ffa5; margin-bottom: 8px;">🎵 Mixkit - Romantic Piano</h4>
                    <p style="font-size: 11px; margin-bottom: 8px; opacity: 0.8;">浪漫钢琴曲，免费版权</p>
                    <audio controls style="width: 100%; margin-bottom: 8px;">
                        <source src="https://assets.mixkit.co/active_storage/sfx/209/209-preview.mp3" type="audio/mpeg">
                    </audio>
                    <button onclick="playMixkitMusic(209)" 
                            style="background: #06ffa5; color: black; padding: 6px 12px; 
                                   text-decoration: none; border-radius: 3px; margin: 2px; font-size: 11px; border: none; cursor: pointer;">
                        ▶️ 播放此音乐
                    </button>
                </div>
                
                <div style="margin-bottom: 15px;">
                    <h4 style="color: #ff6b6b; margin-bottom: 8px;">🎵 Mixkit - Gentle Love</h4>
                    <p style="font-size: 11px; margin-bottom: 8px; opacity: 0.8;">温柔的爱情音乐</p>
                    <audio controls style="width: 100%; margin-bottom: 8px;">
                        <source src="https://assets.mixkit.co/active_storage/sfx/211/211-preview.mp3" type="audio/mpeg">
                    </audio>
                    <button onclick="playMixkitMusic(211)" 
                            style="background: #ff6b6b; color: white; padding: 6px 12px; 
                                   text-decoration: none; border-radius: 3px; margin: 2px; font-size: 11px; border: none; cursor: pointer;">
                        ▶️ 播放此音乐
                    </button>
                </div>
                
                <div style="margin-bottom: 15px;">
                    <h4 style="color: #3a86ff; margin-bottom: 8px;">🎹 内置爱情旋律</h4>
                    <p style="font-size: 11px; margin-bottom: 8px; opacity: 0.8;">程序生成的钢琴旋律</p>
                    <button onclick="createBuiltInMusic()" 
                            style="background: #3a86ff; color: white; padding: 6px 12px; 
                                   text-decoration: none; border-radius: 3px; margin: 2px; font-size: 11px; border: none; cursor: pointer;">
                        🎹 播放内置旋律
                    </button>
                </div>
                
                <div style="margin-bottom: 15px;">
                    <h4 style="color: #ffbe0b; margin-bottom: 8px;">💡 快速选择</h4>
                    <p style="font-size: 11px; line-height: 1.4;">
                        点击"播放此音乐"按钮，音乐会立即开始播放<br>
                        不需要下载，直接在线播放
                    </p>
                </div>
                
                <button onclick="this.parentElement.style.display='none'" 
                        style="margin-top: 10px; background: rgba(255,255,255,0.2); color: white; 
                               border: 1px solid rgba(255,255,255,0.3); padding: 8px 15px; 
                               border-radius: 5px; cursor: pointer; font-size: 12px;">
                    ✖️ 关闭
                </button>
            `;
            
            document.body.appendChild(player);
            window.externalMusicPlayer = player;
        }

        function playMixkitMusic(trackId) {
            stopWorkingMusicPlayer();
            
            workingAudio = new Audio();
            workingAudio.src = `https://assets.mixkit.co/active_storage/sfx/${trackId}/${trackId}-preview.mp3`;
            workingAudio.loop = true;
            workingAudio.volume = 0.3;
            
            workingAudio.play().then(() => {
                showMusicNotification(`💕 正在播放 Mixkit 音乐 #${trackId}`);
                window.externalMusicPlayer.style.display = 'none';
            }).catch(error => {
                console.log('Mixkit音乐播放失败:', error);
                showMusicNotification('❌ 音乐播放失败，请重试');
            });
        }

        function showMusicNotification(message) {
            // 显示音乐通知
            if (window.musicNotification) {
                window.musicNotification.remove();
            }
            
            const notification = document.createElement('div');
            notification.style.cssText = `
                position: fixed;
                top: 20px;
                right: 20px;
                background: rgba(0, 0, 0, 0.8);
                color: white;
                padding: 10px 15px;
                border-radius: 5px;
                border: 1px solid rgba(255, 255, 255, 0.3);
                z-index: 1000;
                font-size: 14px;
                backdrop-filter: blur(10px);
            `;
            notification.textContent = message;
            document.body.appendChild(notification);
            
            window.musicNotification = notification;
            
            setTimeout(() => {
                notification.remove();
            }, 3000);
        }

        function toggleParticles() {
            particleEnabled = !particleEnabled;
        }

        function createExplosion() {
            const centerX = window.innerWidth / 2;
            const centerY = window.innerHeight / 2;
            
            for (let i = 0; i < 50; i++) {
                setTimeout(() => {
                    createFirework(
                        centerX + (Math.random() - 0.5) * 200,
                        centerY + (Math.random() - 0.5) * 200
                    );
                }, i * 20);
            }
        }

        // 点击创建烟花
        document.addEventListener('click', (e) => {
            createFirework(e.clientX, e.clientY);
        });

        // 创建浮动文字
        function createFloatingText() {
            const texts = ['💕', '🌟', '✨', '💖', '💝', '💗', '💓', '💘'];
            const text = texts[Math.floor(Math.random() * texts.length)];
            
            const floatingText = document.createElement('div');
            floatingText.className = 'floating-text';
            floatingText.textContent = text;
            floatingText.style.left = Math.random() * 100 + '%';
            floatingText.style.animationDelay = Math.random() * 5 + 's';
            
            document.body.appendChild(floatingText);
            
            setTimeout(() => {
                floatingText.remove();
            }, 15000);
        }

        // 初始化
        document.addEventListener('DOMContentLoaded', () => {
            createStars();
            
            // 定期创建浮动文字
            setInterval(createFloatingText, 2000);
            
            // 自动烟花
            setInterval(() => {
                if (Math.random() > 0.7) {
                    const x = Math.random() * window.innerWidth;
                    const y = Math.random() * window.innerHeight;
                    createFirework(x, y);
                }
            }, 3000);
        });

        // 键盘控制
        document.addEventListener('keydown', (e) => {
            switch(e.key) {
                case ' ':
                    e.preventDefault();
                    createExplosion();
                    break;
                case 'f':
                    toggleFireworks();
                    break;
                case 'm':
                    toggleMusic();
                    break;
                case 'p':
                    toggleParticles();
                    break;
            }
        });
    </script>
</body>
</html>
