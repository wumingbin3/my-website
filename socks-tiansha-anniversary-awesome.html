<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>袜子 & 天煞 - 一周年纪念</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'STSong', 'SimSun', 'Microsoft YaHei', serif;
            background: #000;
            overflow-x: hidden;
            min-height: 100vh;
        }

        .container {
            position: relative;
            width: 100%;
            min-height: 100vh;
            background: linear-gradient(45deg, #1a1a2e, #16213e, #0f3460);
        }

        /* 动态背景 */
        .animated-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(45deg, #ff006e, #8338ec, #3a86ff, #06ffa5);
            background-size: 400% 400%;
            animation: gradientShift 15s ease infinite;
            z-index: 1;
        }

        @keyframes gradientShift {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* 粒子效果 */
        .particles {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 2;
            pointer-events: none;
        }

        .particle {
            position: absolute;
            width: 4px;
            height: 4px;
            background: rgba(255, 255, 255, 0.8);
            border-radius: 50%;
            animation: float 6s infinite linear;
        }

        @keyframes float {
            0% {
                transform: translateY(100vh) rotate(0deg);
                opacity: 0;
            }
            10% {
                opacity: 1;
            }
            90% {
                opacity: 1;
            }
            100% {
                transform: translateY(-100px) rotate(360deg);
                opacity: 0;
            }
        }

        /* 主要内容 */
        .main-content {
            position: relative;
            z-index: 3;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 40px 20px;
        }

        /* 3D卡片效果 */
        .anniversary-card {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(20px);
            border-radius: 30px;
            padding: 60px 40px;
            max-width: 1000px;
            width: 90%;
            border: 1px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.5);
            transform-style: preserve-3d;
            animation: cardFloat 6s ease-in-out infinite;
            position: relative;
            overflow: hidden;
        }

        @keyframes cardFloat {
            0%, 100% { transform: translateY(0px) rotateX(0deg); }
            50% { transform: translateY(-20px) rotateX(2deg); }
        }

        /* 霓虹光效 */
        .neon-text {
            font-size: 4rem;
            font-weight: bold;
            text-align: center;
            margin-bottom: 30px;
            background: linear-gradient(45deg, #ff006e, #8338ec, #3a86ff, #06ffa5);
            background-size: 400% 400%;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            animation: neonGlow 3s ease-in-out infinite alternate;
            text-shadow: 0 0 20px rgba(255, 255, 255, 0.5);
        }

        @keyframes neonGlow {
            0% { filter: hue-rotate(0deg); }
            100% { filter: hue-rotate(360deg); }
        }

        /* 情侣头像区域 */
        .couple-section {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 60px;
            margin: 50px 0;
            flex-wrap: wrap;
        }

        .avatar-container {
            position: relative;
            text-align: center;
        }

        .avatar-ring {
            width: 200px;
            height: 200px;
            border-radius: 50%;
            background: linear-gradient(45deg, #ff006e, #8338ec, #3a86ff, #06ffa5);
            background-size: 400% 400%;
            animation: ringRotate 4s linear infinite;
            padding: 8px;
            position: relative;
        }

        @keyframes ringRotate {
            0% { transform: rotate(0deg); background-position: 0% 50%; }
            100% { transform: rotate(360deg); background-position: 100% 50%; }
        }

        .avatar {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            overflow: hidden;
            position: relative;
            background: #fff;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 80px;
        }

        .avatar img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            border-radius: 50%;
        }

        .avatar-name {
            margin-top: 20px;
            font-size: 2rem;
            font-weight: bold;
            color: #fff;
            text-shadow: 0 0 10px rgba(255, 255, 255, 0.8);
            animation: nameGlow 2s ease-in-out infinite alternate;
        }

        @keyframes nameGlow {
            0% { text-shadow: 0 0 10px rgba(255, 255, 255, 0.8); }
            100% { text-shadow: 0 0 20px rgba(255, 255, 255, 1); }
        }

        /* 爱心连接 */
        .love-connection {
            font-size: 4rem;
            animation: heartBeat 1.5s ease-in-out infinite;
            background: linear-gradient(45deg, #ff006e, #ff4081);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        @keyframes heartBeat {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.2); }
        }

        /* 日期显示 */
        .date-display {
            font-size: 1.5rem;
            color: rgba(255, 255, 255, 0.9);
            text-align: center;
            margin: 30px 0;
            padding: 20px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 15px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        /* 周年数字 */
        .anniversary-number {
            font-size: 8rem;
            font-weight: bold;
            text-align: center;
            margin: 40px 0;
            background: linear-gradient(45deg, #ff006e, #8338ec, #3a86ff, #06ffa5);
            background-size: 400% 400%;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            animation: numberPulse 2s ease-in-out infinite;
            position: relative;
        }

        @keyframes numberPulse {
            0%, 100% { transform: scale(1); filter: hue-rotate(0deg); }
            50% { transform: scale(1.1); filter: hue-rotate(180deg); }
        }

        .anniversary-number::before {
            content: '';
            position: absolute;
            top: -20px;
            left: -20px;
            right: -20px;
            bottom: -20px;
            background: radial-gradient(circle, rgba(255, 255, 255, 0.1) 0%, transparent 70%);
            border-radius: 50%;
            animation: auraGlow 3s ease-in-out infinite alternate;
        }

        @keyframes auraGlow {
            0% { opacity: 0.3; transform: scale(1); }
            100% { opacity: 0.8; transform: scale(1.2); }
        }

        /* 祝福语 */
        .blessing-text {
            font-size: 1.8rem;
            line-height: 1.8;
            text-align: center;
            color: rgba(255, 255, 255, 0.9);
            margin: 40px 0;
            padding: 30px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 20px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            position: relative;
            overflow: hidden;
        }

        .blessing-text::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: linear-gradient(45deg, transparent, rgba(255, 255, 255, 0.1), transparent);
            transform: rotate(45deg);
            animation: shine 4s infinite;
        }

        @keyframes shine {
            0% { transform: translateX(-100%) translateY(-100%) rotate(45deg); }
            100% { transform: translateX(100%) translateY(100%) rotate(45deg); }
        }

        /* 里程碑 */
        .milestone {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin: 40px 0;
        }

        .milestone-item {
            background: rgba(255, 255, 255, 0.1);
            padding: 25px;
            border-radius: 15px;
            text-align: center;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            transform: translateY(0);
            transition: transform 0.3s ease;
        }

        .milestone-item:hover {
            transform: translateY(-10px);
            box-shadow: 0 15px 30px rgba(255, 255, 255, 0.2);
        }

        .milestone-number {
            font-size: 2.5rem;
            font-weight: bold;
            color: #06ffa5;
            margin-bottom: 10px;
            text-shadow: 0 0 10px rgba(6, 255, 165, 0.8);
        }

        .milestone-label {
            font-size: 1rem;
            color: rgba(255, 255, 255, 0.8);
        }

        /* 页脚 */
        .footer {
            text-align: center;
            margin-top: 60px;
            padding: 30px;
            color: rgba(255, 255, 255, 0.7);
            font-size: 1.2rem;
            background: rgba(0, 0, 0, 0.3);
            border-radius: 15px;
            backdrop-filter: blur(10px);
        }

        /* 响应式设计 */
        @media (max-width: 768px) {
            .neon-text {
                font-size: 2.5rem;
            }
            
            .couple-section {
                gap: 30px;
            }
            
            .avatar-ring {
                width: 150px;
                height: 150px;
            }
            
            .love-connection {
                font-size: 3rem;
            }
            
            .anniversary-number {
                font-size: 5rem;
            }
            
            .blessing-text {
                font-size: 1.4rem;
            }
        }

        /* 音乐控制 */
        .music-control {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 10;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 50%;
            width: 50px;
            height: 50px;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            transition: all 0.3s ease;
        }

        .music-control:hover {
            transform: scale(1.1);
            box-shadow: 0 0 20px rgba(255, 255, 255, 0.5);
        }

        .music-icon {
            font-size: 24px;
            color: #fff;
        }

        /* 烟花效果 */
        .firework {
            position: fixed;
            width: 4px;
            height: 4px;
            background: #fff;
            border-radius: 50%;
            pointer-events: none;
            z-index: 4;
        }

        @keyframes fireworkExplode {
            0% {
                transform: scale(0);
                opacity: 1;
            }
            100% {
                transform: scale(1);
                opacity: 0;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- 动态背景 -->
        <div class="animated-bg"></div>
        
        <!-- 粒子效果 -->
        <div class="particles" id="particles"></div>
        
        <!-- 音乐控制 -->
        <div class="music-control" onclick="toggleMusic()">
            <div class="music-icon" id="musicIcon">🎵</div>
        </div>
        
        <!-- 主要内容 -->
        <div class="main-content">
            <div class="anniversary-card">
                <h1 class="neon-text">💕 一周年纪念 💕</h1>
                
                <div class="couple-section">
                    <div class="avatar-container">
                        <div class="avatar-ring">
                            <div class="avatar">
                                <img src="socks-avatar.jpg" alt="袜子" onerror="this.style.display='none'; this.parentNode.innerHTML='👩';">
                            </div>
                        </div>
                        <div class="avatar-name">袜子</div>
                    </div>
                    
                    <div class="love-connection">💕</div>
                    
                    <div class="avatar-container">
                        <div class="avatar-ring">
                            <div class="avatar">
                                <img src="tiansha-avatar.jpg" alt="天煞" onerror="this.style.display='none'; this.parentNode.innerHTML='👨';">
                            </div>
                        </div>
                        <div class="avatar-name">天煞</div>
                    </div>
                </div>
                
                <div class="date-display">
                    📅 2025.05.27 ~ 2026.05.27
                </div>
                
                <div class="blessing-text">
                    一年的相知相爱<br>
                    每一天都是爱情的见证<br>
                    从相遇的瞬间到相守的永恒
                </div>
                
                <div class="anniversary-number">1</div>
                
                <div class="milestone">
                    <div class="milestone-item">
                        <div class="milestone-number">365</div>
                        <div class="milestone-label">天的陪伴</div>
                    </div>
                    <div class="milestone-item">
                        <div class="milestone-number">8760</div>
                        <div class="milestone-label">小时的思念</div>
                    </div>
                    <div class="milestone-item">
                        <div class="milestone-number">525600</div>
                        <div class="milestone-label">分钟的心动</div>
                    </div>
                </div>
                
                <div class="footer">
                    ✨ 愿爱情如星辰，永恒闪耀 ✨
                </div>
            </div>
        </div>
    </div>

    <script>
        // 创建粒子效果
        function createParticles() {
            const particlesContainer = document.getElementById('particles');
            const particleCount = 50;
            
            for (let i = 0; i < particleCount; i++) {
                const particle = document.createElement('div');
                particle.className = 'particle';
                particle.style.left = Math.random() * 100 + '%';
                particle.style.animationDelay = Math.random() * 6 + 's';
                particle.style.animationDuration = (Math.random() * 3 + 3) + 's';
                particlesContainer.appendChild(particle);
            }
        }

        // 创建烟花效果
        function createFirework(x, y) {
            const colors = ['#ff006e', '#8338ec', '#3a86ff', '#06ffa5', '#ffbe0b'];
            const particleCount = 12;
            
            for (let i = 0; i < particleCount; i++) {
                const firework = document.createElement('div');
                firework.className = 'firework';
                firework.style.left = x + 'px';
                firework.style.top = y + 'px';
                firework.style.background = colors[Math.floor(Math.random() * colors.length)];
                
                const angle = (i * 360) / particleCount;
                const distance = 50 + Math.random() * 50;
                const radians = (angle * Math.PI) / 180;
                
                firework.style.transform = `translate(${Math.cos(radians) * distance}px, ${Math.sin(radians) * distance}px)`;
                firework.style.animation = 'fireworkExplode 1s ease-out forwards';
                
                document.body.appendChild(firework);
                
                setTimeout(() => {
                    firework.remove();
                }, 1000);
            }
        }

        // 点击创建烟花
        document.addEventListener('click', function(e) {
            createFirework(e.clientX, e.clientY);
        });

        // 音乐控制
        let isPlaying = false;
        function toggleMusic() {
            const musicIcon = document.getElementById('musicIcon');
            isPlaying = !isPlaying;
            musicIcon.textContent = isPlaying ? '🔇' : '🎵';
            
            // 这里可以添加实际的音乐播放逻辑
            if (isPlaying) {
                console.log('音乐开始播放');
                // 创建音频元素并播放
                const audio = new Audio();
                // audio.src = 'your-music-file.mp3';
                // audio.play().catch(e => console.log('音乐播放失败:', e));
            } else {
                console.log('音乐停止播放');
                // 停止音乐
            }
        }

        // 自动创建烟花
        setInterval(() => {
            const x = Math.random() * window.innerWidth;
            const y = Math.random() * window.innerHeight;
            createFirework(x, y);
        }, 3000);

        // 初始化
        document.addEventListener('DOMContentLoaded', function() {
            createParticles();
            
            // 添加鼠标移动效果
            document.addEventListener('mousemove', function(e) {
                const card = document.querySelector('.anniversary-card');
                const rect = card.getBoundingClientRect();
                const x = e.clientX - rect.left;
                const y = e.clientY - rect.top;
                
                const centerX = rect.width / 2;
                const centerY = rect.height / 2;
                
                const rotateX = (y - centerY) / 10;
                const rotateY = (centerX - x) / 10;
                
                card.style.transform = `perspective(1000px) rotateX(${rotateX}deg) rotateY(${rotateY}deg)`;
            });
            
            // 鼠标离开时重置
            document.addEventListener('mouseleave', function() {
                const card = document.querySelector('.anniversary-card');
                card.style.transform = 'perspective(1000px) rotateX(0deg) rotateY(0deg)';
            });
        });
    </script>
</body>
</html>
