<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>袜子 & 天煞 - 一周年纪念</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'STSong', 'SimSun', 'Microsoft YaHei', serif;
            background: linear-gradient(135deg, #ff9a9e 0%, #fecfef 25%, #a8edea 75%, #fed6e3 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .anniversary-card {
            width: 900px;
            min-height: 1400px;
            height: auto;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 50%, #f093fb 100%);
            border-radius: 25px;
            position: relative;
            overflow: hidden;
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.4);
            border: 10px solid #fff;
        }

        .background-pattern {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: 
                radial-gradient(circle at 15% 85%, rgba(255, 255, 255, 0.15) 0%, transparent 50%),
                radial-gradient(circle at 85% 15%, rgba(255, 255, 255, 0.15) 0%, transparent 50%),
                radial-gradient(circle at 45% 45%, rgba(255, 255, 255, 0.08) 0%, transparent 50%);
        }

        .floating-elements {
            position: absolute;
            width: 100%;
            height: 100%;
            pointer-events: none;
        }

        .floating-heart {
            position: absolute;
            color: rgba(255, 255, 255, 0.1);
            font-size: 28px;
            animation: float 8s ease-in-out infinite;
        }

        .floating-star {
            position: absolute;
            color: rgba(255, 215, 0, 0.2);
            font-size: 20px;
            animation: twinkle 4s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0px) rotate(0deg); }
            50% { transform: translateY(-25px) rotate(8deg); }
        }

        @keyframes twinkle {
            0%, 100% { opacity: 0.2; transform: scale(1); }
            50% { opacity: 0.8; transform: scale(1.2); }
        }

        .content {
            position: relative;
            z-index: 2;
            min-height: 100%;
            height: auto;
            display: flex;
            flex-direction: column;
            justify-content: flex-start;
            align-items: center;
            text-align: center;
            padding: 60px 40px;
            color: white;
        }

        .anniversary-ribbon {
            background: linear-gradient(45deg, #ff6b6b, #ee5a52, #ff8e8e);
            color: white;
            padding: 20px 40px;
            border-radius: 60px;
            font-size: 28px;
            font-weight: bold;
            margin-bottom: 40px;
            box-shadow: 0 10px 25px rgba(255, 107, 107, 0.5);
            border: 4px solid rgba(255, 255, 255, 0.3);
            position: relative;
            overflow: hidden;
        }

        .anniversary-ribbon::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: linear-gradient(45deg, transparent, rgba(255, 255, 255, 0.3), transparent);
            transform: rotate(45deg);
            animation: shine 3s infinite;
        }

        @keyframes shine {
            0% { transform: translateX(-100%) translateY(-100%) rotate(45deg); }
            100% { transform: translateX(100%) translateY(100%) rotate(45deg); }
        }

        .couple-section {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 40px;
            margin-bottom: 40px;
        }

        .person {
            text-align: center;
            position: relative;
        }

        .person-avatar {
            width: 180px;
            height: 180px;
            border-radius: 50%;
            background: linear-gradient(45deg, #ff6b6b, #4ecdc4);
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 80px;
            margin-bottom: 20px;
            border: 6px solid rgba(255, 255, 255, 0.4);
            box-shadow: 0 12px 30px rgba(0, 0, 0, 0.4);
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            overflow: hidden;
        }
        
        .person-avatar img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            border-radius: 50%;
            image-rendering: auto;
            image-rendering: -webkit-optimize-contrast;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
            backface-visibility: hidden;
            transform: translateZ(0);
            filter: contrast(1.1) brightness(1.05);
            transition: filter 0.3s ease;
        }
        
        .person-avatar img:hover {
            filter: contrast(1.2) brightness(1.1);
        }

        .person-name {
            font-size: 32px;
            font-weight: bold;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.3);
        }

        .person.gender-female .person-avatar {
            background: linear-gradient(45deg, #ff9a9e, #fecfef);
        }

        .person.gender-male .person-avatar {
            background: linear-gradient(45deg, #4ecdc4, #44a08d);
        }

        .love-connection {
            font-size: 48px;
            color: #ff6b6b;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.3);
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.1); }
        }

        .date-range {
            font-size: 36px;
            margin-bottom: 30px;
            opacity: 0.9;
            font-weight: 300;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.2);
        }

        .divider {
            width: 300px;
            height: 4px;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.8), transparent);
            margin: 40px auto;
        }

        .anniversary-message {
            font-size: 32px;
            line-height: 1.8;
            margin-bottom: 50px;
            max-width: 700px;
            font-weight: 300;
            text-shadow: 3px 3px 6px rgba(0, 0, 0, 0.3);
        }

        .one-year-badge {
            font-size: 140px;
            font-weight: bold;
            color: #ff6b6b;
            margin-bottom: 20px;
            text-shadow: 4px 4px 8px rgba(0, 0, 0, 0.4);
            position: relative;
            animation: glow 2s ease-in-out infinite alternate;
        }

        @keyframes glow {
            from { text-shadow: 4px 4px 8px rgba(0, 0, 0, 0.4), 0 0 20px rgba(255, 107, 107, 0.5); }
            to { text-shadow: 4px 4px 8px rgba(0, 0, 0, 0.4), 0 0 30px rgba(255, 107, 107, 0.8); }
        }

        .year-label {
            font-size: 32px;
            color: rgba(255, 255, 255, 0.9);
            margin-top: -15px;
            font-weight: 300;
        }

        .milestone {
            background: rgba(255, 255, 255, 0.1);
            padding: 30px;
            border-radius: 20px;
            margin: 40px 0;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .milestone h3 {
            font-size: 28px;
            margin-bottom: 15px;
            color: #fff;
        }

        .milestone p {
            font-size: 20px;
            line-height: 1.6;
            opacity: 0.9;
        }

        .footer {
            position: relative;
            margin-top: 60px;
            left: 0;
            right: 0;
            text-align: center;
            font-size: 20px;
            opacity: 0.8;
            font-weight: 300;
        }

        .decorative-border {
            position: absolute;
            top: 30px;
            left: 30px;
            right: 30px;
            bottom: 30px;
            border: 3px solid rgba(255, 255, 255, 0.2);
            border-radius: 20px;
            pointer-events: none;
        }

        .corner-ornament {
            position: absolute;
            width: 80px;
            height: 80px;
            border: 4px solid rgba(255, 255, 255, 0.4);
        }

        .corner-ornament.top-left {
            top: 40px;
            left: 40px;
            border-right: none;
            border-bottom: none;
            border-top-left-radius: 15px;
        }

        .corner-ornament.top-right {
            top: 40px;
            right: 40px;
            border-left: none;
            border-bottom: none;
            border-top-right-radius: 15px;
        }

        .corner-ornament.bottom-left {
            bottom: 40px;
            left: 40px;
            border-right: none;
            border-top: none;
            border-bottom-left-radius: 15px;
        }

        .corner-ornament.bottom-right {
            bottom: 40px;
            right: 40px;
            border-left: none;
            border-top: none;
            border-bottom-right-radius: 15px;
        }

        @media (max-width: 1000px) {
            .anniversary-card {
                width: 95vw;
                height: auto;
                min-height: auto;
                border-radius: 20px;
                border: 6px solid #fff;
            }
            
            .couple-section {
                flex-direction: column;
                gap: 20px;
            }
            
            .person-name {
                font-size: 28px;
            }
            
            .person-avatar {
                width: 140px;
                height: 140px;
            }
            
            .one-year-badge {
                font-size: 100px;
            }
            
            .anniversary-message {
                font-size: 24px;
            }
            
            .content {
                padding: 40px 20px;
            }
        }
    </style>
</head>
<body>
    <div class="anniversary-card">
        <div class="background-pattern"></div>
        
        <div class="floating-elements">
            <div class="floating-heart" style="top: 10%; left: 5%; animation-delay: 0s;">💕</div>
            <div class="floating-heart" style="top: 15%; right: 8%; animation-delay: 1s;">💖</div>
            <div class="floating-heart" style="bottom: 25%; left: 12%; animation-delay: 2s;">💗</div>
            <div class="floating-heart" style="bottom: 20%; right: 15%; animation-delay: 3s;">💓</div>
            <div class="floating-heart" style="top: 45%; left: 8%; animation-delay: 4s;">💝</div>
            <div class="floating-heart" style="top: 55%; right: 10%; animation-delay: 5s;">💘</div>
            
            <div class="floating-star" style="top: 20%; left: 20%; animation-delay: 0.5s;">⭐</div>
            <div class="floating-star" style="top: 30%; right: 25%; animation-delay: 1.5s;">✨</div>
            <div class="floating-star" style="bottom: 35%; left: 30%; animation-delay: 2.5s;">⭐</div>
            <div class="floating-star" style="bottom: 40%; right: 35%; animation-delay: 3.5s;">✨</div>
        </div>
        
        <div class="decorative-border"></div>
        <div class="corner-ornament top-left"></div>
        <div class="corner-ornament top-right"></div>
        <div class="corner-ornament bottom-left"></div>
        <div class="corner-ornament bottom-right"></div>
        
        <div class="content">
            <div class="anniversary-ribbon">
                💕 一周年纪念 💕
            </div>
            
            <div class="couple-section">
                <div class="person gender-female">
                    <div class="person-avatar">
                        <img src="socks-avatar.jpg" alt="袜子" onerror="this.style.display='none'; this.parentNode.innerHTML='👩';">
                    </div>
                    <div class="person-name">袜子</div>
                </div>
                
                <div class="love-connection">💕</div>
                
                <div class="person gender-male">
                    <div class="person-avatar">
                        <img src="tiansha-avatar.jpg" alt="天煞" onerror="this.style.display='none'; this.parentNode.innerHTML='👨';">
                    </div>
                    <div class="person-name">天煞</div>
                </div>
            </div>
            
            <div class="date-range">
                2025.05.27 ~ 2026.05.27
            </div>
            
            <div class="divider"></div>
            
            <div class="anniversary-message">
                一年的相知相爱<br>
                每一天都是爱情的见证<br>
                从相遇的瞬间到相守的永恒
            </div>
            
            <div class="one-year-badge">
                1
            </div>
            <div class="year-label">
                周年快乐
            </div>
            
            <div class="milestone">
                <h3>爱的里程碑</h3>
                <p>
                    365天的陪伴<br>
                    8760小时的思念<br>
                    525600分钟的心动<br>
                    每一秒都值得珍惜
                </p>
            </div>
            
            <div class="divider"></div>
        </div>
        
        <div class="footer">
            愿爱情如星辰，永恒闪耀
        </div>
    </div>
    <script>
        // 调试信息
        console.log('网页加载完成');
        console.log('头像图片应该已经加载');
    </script>
</body>
</html>
